<!DOCTYPE html>
<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>
    <body>
        <div id="app"></div>
        <script>
            var model = 
            {
                inputs:
                {
                    type: "",
                    number: null,
                    notifiedbody: "",
                    issueDate: "",
                    expiryDate: "",
                },

                searchByType: "",
                searchByNumber: -1,

                searchResults: [],
            }

            GetData();
            updateView();

            async function GetData()
            {
                const response = await axios.get("/api/test");
                console.log(response.data);
            }

            async function PostData(cert)
            {
                const msg = await axios.post("/api/cert", cert);
            }

            function updateView()
            {
                document.getElementById("app").innerHTML = mainPageHTML();
            }

            function mainPageHTML()
            {
                return /*HTML*/ `
                    <h1>Certificates</h1>

                    <input placeholder="Type" oninput="model.inputs.type = this.value; console.log(model.inputs.type);">
                    <input placeholder="Number" oninput="model.inputs.number = this.value; console.log(model.inputs.number.toString());">
                    <input placeholder="Notified body" oninput="model.inputs.notifiedbody = this.value; console.log(model.inputs.notifiedbody);">
                    <input type="date" placeholder="YYYY-MM-DD" oninput="model.inputs.issueDate = this.value; console.log(model.inputs.issueDate);">
                    <input type="date" placeholder="YYYY-MM-DD" oninput="model.inputs.expiryDate = this.value; console.log(model.inputs.expiryDate);">

                    <button onclick="SubmitAll()">Submit</button>

                    <br>
                    Search certificates:
                    <input placeholder="Certificate type" oninput="model.searchByType = this.value">
                    <button onclick="SearchByType()">Search by type</button>
                    <input placeholder="Certificate number" oninput="model.searchByNumber = this.value">
                    <button onclick="SearchByNumber()">Search by number</button>
                    <br>
                    ${renderSearchResults()}
                `;
            }

            async function SearchByType()
            {
                const response = await axios.get("/api/searchtype", { params: { type: model.searchByType } } );
                model.searchResults = response.data;
                updateView();
            }

            async function SearchByNumber()
            {
                const response = await axios.get("/api/searchnumber", { params: { number: model.searchByNumber } } );
                model.searchResults = response.data;
                updateView();
            }

            function ClearSearches()
            {
                model.searchByType = "";
                model.searchByNumber = -1;
            }

            function renderSearchResults()
            {
                return model.searchResults.map(cert => `
                    <div>
                        ${cert.type} - ${cert.number}
                    </div>
                `).join("");
            }

            function SubmitAll()
            {
                if (InvalidInput())
                {
                    alert("All fields must be filled in.");
                    return;
                }

                const cert = 
                {
                    type: model.inputs.type,
                    number: model.inputs.number,
                    notifiedBody: model.inputs.notifiedbody,
                    issueDate: model.inputs.issueDate,
                    expiryDate: model.inputs.expiryDate,
                }

                PostData(cert);
                ClearInputs();
                updateView();
            }

            function InvalidInput()
            {
                return model.inputs.type == "" || model.inputs.number == null || model.inputs.notifiedbody == "" || model.inputs.issueDate == "" || model.inputs.expiryDate == "";
            }

            function ClearInputs()
            {
                model.inputs.type = "";
                model.inputs.number = null;
                model.inputs.notifiedbody = "";
                model.inputs.issueDate = "";
                model.inputs.expiryDate = "";
            }

        </script>
    </body>
</html>
