<!DOCTYPE html>
<html>
    <head>
        <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    </head>
    <body>
        <div id="app"></div>
        <script>

            (async function init() {
                await GetData();
                updateView();
            })();

            // model
            var model = 
            {
                inputs:
                {
                    type: "",
                    number: "",
                    notifiedbody: "",
                    issueDate: "",
                    expiryDate: "",
                },

                searchByType: "",
                searchByNumber: "",

                searchResults: [],

                fullCertificateList: [],
            }


            // controller

            async function GetData() 
            {
                const response = await axios.get("/api/completelist");
                model.fullCertificateList = response.data;
            }

            // async function PostData(cert) 
            // {
            //     const msg = await axios.post("/api/cert", cert);
            // }

            async function SearchByType() 
            {
                const response = await axios.get("/api/searchtype", { params: { type: model.searchByType } });
                model.searchResults = response.data;
                updateView();
            }

            async function SearchByNumber() 
            {
                const response = await axios.get("/api/searchnumber", { params: { number: model.searchByNumber } });
                model.searchResults = response.data;
                updateView();
            }

            function ClearSearches()
            {
                model.searchByType = "";
                model.searchByNumber = "";
            }

            async function SubmitAll()
            {
                if (InvalidInput()) 
                {
                    alert("All fields must be filled in.");
                    return;
                }

                const file = document.getElementById("fileInput").files[0];

                if (!file) {
                    alert("Please select a certificate file.");
                    return;
                }

                const formData = new FormData();

                formData.append("type", model.inputs.type);
                formData.append("number", model.inputs.number);
                formData.append("notifiedBody", model.inputs.notifiedbody);
                formData.append("issueDate", model.inputs.issueDate);
                formData.append("expiryDate", model.inputs.expiryDate);

                formData.append("file", file);

                await axios.post("/api/cert", formData);

                ClearInputs();
                await GetData();
                updateView();
            }

            function InvalidInput() 
            {
                return model.inputs.type == "" || model.inputs.number == "" || model.inputs.notifiedbody == "" || model.inputs.issueDate == "" || model.inputs.expiryDate == "";
            }

            function ClearInputs() 
            {
                model.inputs.type = "";
                model.inputs.number = "";
                model.inputs.notifiedbody = "";
                model.inputs.issueDate = "";
                model.inputs.expiryDate = "";
            }


            // view

            function updateView() 
            {
                document.getElementById("app").innerHTML = mainPageHTML();
            }

            function mainPageHTML() 
            {
                return /*HTML*/ `
                    <h2>Certificates</h2>

                    <input placeholder="Type" oninput="model.inputs.type = this.value">
                    <input placeholder="Number" oninput="model.inputs.number = this.value">
                    <input placeholder="Notified body" oninput="model.inputs.notifiedbody = this.value">
                    <input type="date" placeholder="YYYY-MM-DD" oninput="model.inputs.issueDate = this.value">
                    <input type="date" placeholder="YYYY-MM-DD" oninput="model.inputs.expiryDate = this.value">
                    <br>
                    <input id="fileInput" type="file" placeholder="Upload certificate">
                    <button onclick="SubmitAll()">Submit</button>

                    <br>
                    <h3>Search certificates:</h3>
                    <input placeholder="Certificate type" oninput="model.searchByType = this.value">
                    <button onclick="SearchByType()">Search by type</button>
                    <input placeholder="Certificate number" oninput="model.searchByNumber = this.value">
                    <button onclick="SearchByNumber()">Search by number</button>
                    <br>
                    ${(model.searchByType == "" && model.searchByNumber == "") ? renderFullCertList() : renderSearchResults() }
                `;
            }


            function renderFullCertList() 
            {
                return model.fullCertificateList.map(cert => CertListHtml(cert)).join("");
            }


            function renderSearchResults() 
            {
                return model.searchResults.map(cert => CertListHtml(cert)).join("");
            }

            function CertListHtml(cert)
            {
                return `
                    <div>
                        ${cert.type} - ${cert.number} - ${cert.notifiedBody} - ${cert.issueDate} - ${cert.expiryDate}
                    </div>
                `;
            }

        </script>
    </body>
</html>
